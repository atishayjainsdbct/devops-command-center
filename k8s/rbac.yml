apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-command-center-role

rules:
- apiGroups: [""]
  resources:
    - pods
    - namespaces
    - events
  verbs:
    - get
    - list
    - watch
    - delete

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
    - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-command-center-binding

subjects:
- kind: ServiceAccount
  name: devops-command-center
  namespace: devops-command-center

roleRef:
  kind: ClusterRole
  name: devops-command-center-role
  apiGroup: rbac.authorization.k8s.io
