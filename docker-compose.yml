services:
  backend:
    build: ./backend
    container_name: backend
    network_mode: host
    volumes:
      - ~/.kube:/home/appuser/.kube:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
